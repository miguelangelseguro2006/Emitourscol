backend:
  name: git-gateway
  branch: main

# ── Dónde se guardan las imágenes subidas desde el CMS ──────
media_folder: "assets/img"
public_folder: "/assets/img"

collections:

  # ══════════════════════════════════════════════════════════
  # 🔔 BANNER SUPERIOR
  # ══════════════════════════════════════════════════════════
  - name: "banner"
    label: "🔔 Banner Superior"
    files:
      - name: "banner"
        label: "Banner de oferta"
        file: "data/banner.json"
        format: json
        fields:
          - label: "Mostrar banner"
            name: "activo"
            widget: "boolean"
            default: true
            hint: "Activa o desactiva el banner sin borrarlo"

          - label: "Texto del banner"
            name: "texto"
            widget: "string"
            hint: "Ej: 🎉 ¡Oferta! Paquetes a San Andrés desde $890.000 COP"

          - label: "Texto del botón / enlace"
            name: "linkTexto"
            widget: "string"
            hint: "Ej: ¡Quiero este plan!"

          - label: "Mensaje de WhatsApp al hacer clic"
            name: "whatsappMensaje"
            widget: "text"
            hint: "Este texto se enviará automáticamente por WhatsApp"

  # ══════════════════════════════════════════════════════════
  # ✈️ PROMOCIONES Y DESTINOS
  # ══════════════════════════════════════════════════════════
  - name: "promociones"
    label: "✈️ Promociones y Destinos"
    files:
      - name: "promociones"
        label: "Lista de destinos"
        file: "data/promociones.json"
        format: json
        fields:
          - name: "items"
            label: "Destinos"
            widget: "list"
            label_singular: "Destino"
            summary: "{{fields.destino}} — {{fields.precioDesde}} COP"
            fields:

              - label: "ID único"
                name: "id"
                widget: "string"
                hint: "Solo letras minúsculas y guiones. Ej: san-andres. No cambiar después de creado."

              - label: "Visible en la web"
                name: "activo"
                widget: "boolean"
                default: true
                hint: "Desactivar para ocultar sin borrar"

              - label: "Nombre del destino"
                name: "destino"
                widget: "string"
                hint: "Ej: San Andrés"

              - label: "Emoji del destino"
                name: "emoji"
                widget: "string"
                hint: "Ej: 🌴 — aparece en las cards y en WhatsApp"

              - label: "Imagen del destino"
                name: "imagen"
                widget: "image"
                hint: "Sube la imagen desde aquí. Se usará en el hero, cards y ofertas. Tamaño recomendado: 1200×800px JPG."
                media_folder: "/assets/img"
                public_folder: "/assets/img"
                required: false

              - label: "Badge / etiqueta especial"
                name: "badge"
                widget: "string"
                required: false
                hint: "Ej: 🔥 SÚPER OFERTA — dejar vacío para no mostrar"

              - label: "Descripción corta"
                name: "copy"
                widget: "text"
                hint: "Texto que aparece debajo del nombre del destino"

              - label: "Precio desde (en números)"
                name: "precioDesde"
                widget: "number"
                value_type: "int"
                min: 0
                hint: "Solo el número, sin puntos ni símbolos. Ej: 890000"

              - label: "Moneda"
                name: "moneda"
                widget: "select"
                options: ["COP", "USD"]
                default: "COP"

              - label: "Descripción del precio"
                name: "descripcionPrecio"
                widget: "string"
                default: "por persona"
                hint: "Ej: por persona, por pareja, por noche"

              - label: "¿Qué incluye el paquete?"
                name: "incluye"
                widget: "string"
                hint: "Ej: Vuelo + 3 noches + traslados"

              - label: "Vigencia de la oferta"
                name: "vigencia"
                widget: "string"
                required: false
                hint: "Ej: Hasta el 30 de julio — dejar vacío si no aplica"

              - label: "Aparece en el Hero (slider principal)"
                name: "heroSlide"
                widget: "boolean"
                default: false
                hint: "Activa para que este destino aparezca en el slider del hero con su imagen"

              - label: "Mensaje de WhatsApp"
                name: "whatsappMensaje"
                widget: "text"
                hint: "Mensaje que se enviará al cliente cuando haga clic en 'Quiero este plan'"

  # ══════════════════════════════════════════════════════════
  # 💬 TESTIMONIOS
  # ══════════════════════════════════════════════════════════
  - name: "testimonios"
    label: "💬 Testimonios"
    files:
      - name: "testimonios"
        label: "Lista de testimonios"
        file: "data/testimonios.json"
        format: json
        fields:
          - name: "items"
            label: "Testimonios"
            widget: "list"
            label_singular: "Testimonio"
            summary: "{{fields.nombre}} — {{fields.destino}} ({{fields.estrellas}}★)"
            fields:

              - label: "ID único"
                name: "id"
                widget: "string"
                hint: "Solo letras minúsculas y guiones. Ej: maria-garcia"

              - label: "Visible en la web"
                name: "activo"
                widget: "boolean"
                default: true

              - label: "Nombre completo"
                name: "nombre"
                widget: "string"
                hint: "Ej: Valentina Ríos"

              - label: "Ciudad"
                name: "ciudad"
                widget: "string"
                hint: "Ej: Cali, Valle del Cauca"

              - label: "Destino visitado"
                name: "destino"
                widget: "string"
                hint: "Ej: San Andrés"

              - label: "Emoji avatar"
                name: "emoji"
                widget: "select"
                options: ["👩", "👨", "👩‍💼", "👨‍💼", "👴", "👵", "🧑", "👫", "👨‍👩‍👧‍👦"]
                default: "👩"
                hint: "Ícono que representa al viajero"

              - label: "Calificación (estrellas)"
                name: "estrellas"
                widget: "number"
                min: 1
                max: 5
                default: 5
                hint: "Del 1 al 5"

              - label: "Testimonio"
                name: "texto"
                widget: "text"
                hint: "La experiencia del viajero en sus propias palabras"
