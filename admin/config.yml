backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:

  # ── BANNER ──
  - name: "banner"
    label: "🔔 Banner Superior"
    files:
      - name: "banner"
        label: "Banner de oferta"
        file: "data/banner.json"
        format: json
        fields:
          - { label: "Mostrar banner", name: "activo", widget: "boolean", default: true }
          - { label: "Texto del banner", name: "texto", widget: "string" }
          - { label: "Texto del botón", name: "linkTexto", widget: "string" }
          - { label: "Mensaje WhatsApp", name: "whatsappMensaje", widget: "text" }

  # ── PROMOCIONES ──
  {
