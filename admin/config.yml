backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

# Decap CMS necesita este locale para español
locale: "es"

collections:

  # ══════════════════════════════════════════════════════════
  # 🔔 BANNER SUPERIOR
  # ══════════════════════════════════════════════════════════
  - name: "banner"
    label: "🔔 Banner Superior"
    files:
      - name: "banner"
        label: "Banner de oferta"
        file: "data/banner.json"
        format: json
        fields:
          - label: "Mostrar banner"
            name: "activo"
            widget: "boolean"
            default: true
            hint: "Activa o desactiva el banner sin borrarlo"

          - label: "Texto del banner"
            name: "texto"
            widget: "string"
            hint: "Ej: 🎉 Paquetes a San Andrés desde $890.000 COP"

          - label: "Texto del botón"
            name: "linkTexto"
            widget: "string"
            hint: "Ej: ¡Quiero este plan!"

          - label: "Mensaje de WhatsApp"
            name: "whatsappMensaje"
            widget: "text"
            hint: "Texto que se enviará por WhatsApp al hacer clic"

  # ══════════════════════════════════════════════════════════
  # ✈️ PROMOCIONES Y DESTINOS
  # ══════════════════════════════════════════════════════════
  - name: "promociones"
    label: "✈️ Promociones y Destinos"
    files:
      - name: "promociones"
        label: "Lista de destinos"
        file: "data/promociones.json"
        format: json
        fields:
          - name: "items"
            label: "Destinos"
            widget: "list"
            label_singular: "Destino"
            summary: "{{fields.destino}} — ${{fields.precioDesde}} COP"
            fields:
              - label: "ID único"
                name: "id"
                widget: "string"
                hint: "Solo minúsculas y guiones. Ej: san-andres. No cambiar después."

              - label: "Visible en la web"
                name: "activo"
                widget: "boolean"
                default: true

              - label: "Nombre del destino"
                name: "destino"
                widget: "string"

              - label: "Emoji"
                name: "emoji"
                widget: "string"
                hint: "Ej: 🌴"

              - label: "Imagen del destino"
                name: "imagen"
                widget: "image"
                required: false
                allow_multiple: false
                hint: "Sube la imagen aquí. Recomendado: 1200x800px JPG, máx 300KB"
                media_folder: "/assets/img"
                public_folder: "/assets/img"

              - label: "Badge (etiqueta especial)"
                name: "badge"
                widget: "string"
                required: false
                hint: "Ej: 🔥 SÚPER OFERTA — vacío para ocultar"

              - label: "Descripción corta"
                name: "copy"
                widget: "text"

              - label: "Precio desde (solo número)"
                name: "precioDesde"
                widget: "number"
                value_type: "int"
                min: 0
                hint: "Ej: 890000 (sin puntos ni símbolos)"

              - label: "Moneda"
                name: "moneda"
                widget: "select"
                options: ["COP", "USD"]
                default: "COP"

              - label: "Descripción del precio"
                name: "descripcionPrecio"
                widget: "string"
                default: "por persona"

              - label: "¿Qué incluye?"
                name: "incluye"
                widget: "string"
                hint: "Ej: Vuelo + 3 noches + traslados"

              - label: "Vigencia"
                name: "vigencia"
                widget: "string"
                required: false
                hint: "Ej: Hasta el 30 de julio — vacío si no aplica"

              - label: "Aparece en el Hero (slider)"
                name: "heroSlide"
                widget: "boolean"
                default: false
                hint: "Activa para mostrar este destino en el slider principal"

              - label: "Mensaje de WhatsApp"
                name: "whatsappMensaje"
                widget: "text"
                hint: "Mensaje al hacer clic en el botón del destino"

  # ══════════════════════════════════════════════════════════
  # 💬 TESTIMONIOS
  # ══════════════════════════════════════════════════════════
  - name: "testimonios"
    label: "💬 Testimonios"
    files:
      - name: "testimonios"
        label: "Lista de testimonios"
        file: "data/testimonios.json"
        format: json
        fields:
          - name: "items"
            label: "Testimonios"
            widget: "list"
            label_singular: "Testimonio"
            summary: "{{fields.nombre}} — {{fields.destino}}"
            fields:
              - label: "ID único"
                name: "id"
                widget: "string"
                hint: "Ej: valentina-rios"

              - label: "Visible en la web"
                name: "activo"
                widget: "boolean"
                default: true

              - label: "Nombre completo"
                name: "nombre"
                widget: "string"

              - label: "Ciudad"
                name: "ciudad"
                widget: "string"
                hint: "Ej: Cali, Valle del Cauca"

              - label: "Destino visitado"
                name: "destino"
                widget: "string"

              - label: "Emoji avatar"
                name: "emoji"
                widget: "select"
                options:
                  - { label: "Mujer 👩", value: "👩" }
                  - { label: "Hombre 👨", value: "👨" }
                  - { label: "Pareja 👫", value: "👫" }
                  - { label: "Familia 👨‍👩‍👧‍👦", value: "👨‍👩‍👧‍👦" }
                  - { label: "Joven 🧑", value: "🧑" }
                default: "👩"

              - label: "Estrellas (1 a 5)"
                name: "estrellas"
                widget: "number"
                min: 1
                max: 5
                default: 5

              - label: "Testimonio"
                name: "texto"
                widget: "text"
                hint: "La experiencia del viajero"
