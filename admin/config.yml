backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:

  # ── BANNER ──
  - name: "banner"
    label: "🔔 Banner Superior"
    files:
      - name: "banner"
        label: "Banner de oferta"
        file: "data/banner.json"
        format: json
        fields:
          - { label: "Mostrar banner", name: "activo", widget: "boolean", default: true }
          - { label: "Texto del banner", name: "texto", widget: "string" }
          - { label: "Texto del botón", name: "linkTexto", widget: "string" }
          - { label: "Mensaje WhatsApp", name: "whatsappMensaje", widget: "text" }

  # ── PROMOCIONES ──
  - name: "promociones"
    label: "✈️ Promociones y Destinos"
    files:
      - name: "promociones"
        label: "Promociones"
        file: "data/promociones.json"
        format: json
        fields:
          - name: "items"
            label: "Lista de promociones"
            widget: "list"
            summary: "{{fields.destino}}"
            fields:
              - { label: "ID único", name: "id", widget: "string" }
              - { label: "Activo", name: "activo", widget: "boolean", default: true }
              - { label: "Destino", name: "destino", widget: "string" }
              - { label: "Emoji", name: "emoji", widget: "string" }
              - { label: "Badge", name: "badge", widget: "string", required: false }
              - { label: "Descripción", name: "copy", widget: "text" }
              - { label: "Precio desde", name: "precioDesde", widget: "number" }
              - { label: "Moneda", name: "moneda", widget: "select", options: ["COP","USD"] }
              - { label: "Descripción precio", name: "descripcionPrecio", widget: "string" }
              - { label: "Incluye", name: "incluye", widget: "string" }
              - { label: "Vigencia", name: "vigencia", widget: "string", required: false }
              - { label: "Gradiente", name: "gradiente", widget: "string" }
              - { label: "WhatsApp", name: "whatsappMensaje", widget: "text" }

  # ── TESTIMONIOS ──
  - name: "testimonios"
    label: "💬 Testimonios"
    files:
      - name: "testimonios"
        label: "Testimonios"
        file: "data/testimonios.json"
        format: json
        fields:
          - name: "items"
            label: "Lista de testimonios"
            widget: "list"
            summary: "{{fields.nombre}} — {{fields.destino}}"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Activo", name: "activo", widget: "boolean", default: true }
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Ciudad", name: "ciudad", widget: "string" }
              - { label: "Destino", name: "destino", widget: "string" }
              - { label: "Emoji", name: "emoji", widget: "string" }
              - { label: "Estrellas", name: "estrellas", widget: "number", min: 1, max: 5 }
              - { label: "Texto", name: "texto", widget: "text" }
