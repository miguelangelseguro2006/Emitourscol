[build]
  publish = "."

# ── Admin: rutas específicas que NO deben redirigirse ──────────
# Decap CMS necesita cargar /admin/config.yml y sus propios JS
[[redirects]]
  from = "/admin/config.yml"
  to = "/admin/config.yml"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

# ── Data JSON: deben ser accesibles directamente ───────────────
[[redirects]]
  from = "/data/*"
  to = "/data/:splat"
  status = 200
  force = true

# ── Assets: imágenes y archivos estáticos ─────────────────────
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
  force = true

# ── SPA fallback: todo lo demás va al index principal ─────────
# IMPORTANTE: este va AL FINAL para no interceptar las rutas reales
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Headers de seguridad ───────────────────────────────────────
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "no-cache"
    Content-Type = "application/json; charset=utf-8"
